<!DOCTYPE html>
<html>
<head>
<title>Media | Mahesh Rathi</title>

<link rel="stylesheet" href="style.css">

<style>
/* Gallery Grid */
.gallery {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-top: 20px;
}

.gallery-item img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery-item img:hover {
  transform: scale(1.05);
}

.caption {
  text-align: center;
  font-size: 14px;
  margin-top: 5px;
  color: #333;
}

/* Lightbox */
#lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}
</style>

</head>

<body>

<header>
<h1>Dr. Mahesh Rathi</h1>
<p>Researcher | Electrical Engineer | AI in Power Systems</p>
</header>

<!-- NAV -->
<nav>
<a href="index.html">Home</a>

<a href="services.html">Services</a>
<a href="lab.html">Lab</a>
<a href="media.html">Media</a>
<a href="resources.html">Resources</a>
<a href="contact.html">Contact</a>
</nav>

<section>

<h2>Media Gallery</h2>

<div class="gallery">

  <div class="gallery-item">
    <img src="images/hello.jpeg" onclick="openLightbox(this)">
    <p class="caption">Welcome Image</p>
  </div>

  <div class="gallery-item">
    <img src="images/photo2.jpg" onclick="openLightbox(this)">
    <p class="caption">Research Activity</p>
  </div>

  <div class="gallery-item">
    <img src="images/photo3.jpg" onclick="openLightbox(this)">
    <p class="caption">Conference Talk</p>
  </div>

  <div class="gallery-item">
    <img src="images/photo4.jpg" onclick="openLightbox(this)">
    <p class="caption">Field Work</p>
  </div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

</section>

<footer>© 2026 Mahesh Rathi</footer>

<!-- JAVASCRIPT (IMPORTANT: BEFORE BODY CLOSE) -->
<script>
function openLightbox(img) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = img.src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
